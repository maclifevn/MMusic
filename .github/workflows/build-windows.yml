name: Build Windows

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-windows:
    name: Windows x64
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build application
        run: pnpm build

      - name: Package Windows installer and portable app
        run: pnpm exec electron-builder --win nsis-web:x64 portable:x64 --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MMusic-Windows-x64
          path: |
            pack/*.exe
            pack/*.blockmap
            pack/latest*.yml
          if-no-files-found: error
          compression-level: 0
          retention-days: 14
